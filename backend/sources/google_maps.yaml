# last_verified: 2026-03-26
# Phase 2: requires Playwright (dynamic renderer)
name: google_maps
base_url: "https://www.google.com/maps/search"
renderer: playwright
search_params:
  q: "{query}+{location}"
pagination:
  type: scroll
  param: null
  start: 0
  max_pages: 10
listing_selector: "div[role='feed'] > div > div > a"
selectors:
  company_name: "div.fontHeadlineSmall::text"
  phone: "span[data-tooltip*='phone']::text"
  address: "div.fontBodyMedium span::text"
  website: "a[data-item-id='authority']::attr(href)"
  category: "span.fontBodyMedium span span::text"
  rating: "span[role='img']::attr(aria-label)"
rate_limit:
  delay_range: [4, 8]
  concurrent: 1
  max_retries: 3
proxy:
  required: true
  country: US
