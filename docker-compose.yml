name: leadgen-scraper

services:
  leadgen-postgres:
    image: postgres:15
    container_name: leadgen-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leadgen
    volumes:
      - leadgen-pgdata:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  leadgen-redis:
    image: redis:7
    container_name: leadgen-redis
    ports:
      - "6385:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  leadgen-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadgen-api
    init: true
    ports:
      - "8010:8000"
    env_file: ./backend/.env
    depends_on:
      leadgen-postgres:
        condition: service_healthy
      leadgen-redis:
        condition: service_healthy
    volumes:
      - ./backend/exports:/app/exports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  leadgen-celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadgen-celery
    init: true
    shm_size: '2gb'
    entrypoint: []
    command: ["celery", "-A", "tasks.celery_app", "worker", "--loglevel=info"]
    env_file: ./backend/.env
    depends_on:
      leadgen-postgres:
        condition: service_healthy
      leadgen-redis:
        condition: service_healthy
    volumes:
      - ./backend/exports:/app/exports

  leadgen-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadgen-frontend
    ports:
      - "3010:80"
    depends_on:
      - leadgen-api

volumes:
  leadgen-pgdata:
